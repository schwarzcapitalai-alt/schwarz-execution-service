<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Schwarz Capital Bot Terminal</title>
<style>
body{margin:0;background:#070b10;color:#e8eef7;font-family:Arial,sans-serif}
header{padding:18px 24px;background:#0d141d;border-bottom:1px solid #1f2f40;display:flex;justify-content:space-between}
h1{margin:0;font-size:24px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px}
.card{background:#101823;border:1px solid #1f2f40;border-radius:12px;padding:16px;min-height:110px}
.wide{grid-column:span 2}.full{grid-column:span 4}
.label{color:#8ea1b7;font-size:12px;text-transform:uppercase}
.value{font-size:24px;font-weight:bold;margin-top:8px}
.green{color:#36d399}.red{color:#fb7185}.yellow{color:#facc15}
pre{white-space:pre-wrap;word-break:break-word;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #1f2f40;text-align:left}
th{color:#8ea1b7}
</style>
</head>
<body>

<header>
  <h1>Schwarz Capital Bot Terminal v1</h1>
  <div id="updated">Loading...</div>
</header>

<div class="grid">

<div class="card">
<div class="label">IBKR Connection</div>
<div id="ibkr" class="value yellow">Loading</div>
</div>

<div class="card">
<div class="label">Execution Mode</div>
<div id="mode" class="value yellow">Loading</div>
</div>

<div class="card">
<div class="label">Bot Decision</div>
<div id="decision" class="value yellow">WAIT</div>
</div>

<div class="card">
<div class="label">Risk Status</div>
<div id="risk" class="value yellow">Loading</div>
</div>

<div class="card wide">
<div class="label">Account Snapshot</div>
<pre id="account">Loading...</pre>
</div>

<div class="card wide">
<div class="label">Decision Engine</div>
<pre id="decisionPayload">Loading...</pre>
</div>

<div class="card full">
<div class="label">System Health</div>
<pre id="health">Loading...</pre>
</div>

</div>
<script src="/bot-terminal/terminal.js"></script>
</body>
</html>
